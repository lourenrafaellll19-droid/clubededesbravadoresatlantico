    <main class="page-container">
        
        <header class="header-topo">
            <img src="logo-atlantico.png" alt="Logo Clube Atlântico" class="club-logo">
            <div class="titulo-wrapper">
                <img src="ornamentoamarelo.png" alt="" class="ornamento">

        <section class="cards-main-container">

           <footer class="navigation-footer">
    <a href="aventurasnaturais.html" class="btn-pilula" onclick="transicaoComSom(event)">VOLTAR</a>

</footer>
            </footer>
        </section>
    </main>
<audio id="somBrilho" preload="auto">
    <source src="somdoclique.mp3" type="audio/mpeg">
</audio>

<script>
 function transicaoComSom(event) {
        // 1. Bloqueia a mudança de página imediata
        event.preventDefault(); 
        
        const link = event.currentTarget.href;
        const som = document.getElementById('somBrilho');

        // 2. Toca o som de brilho
        som.play().then(() => {
            // 3. ESPERA MAIS TEMPO (1200ms = 1.2 segundos)
            // Aumente este número se o seu som for ainda mais longo
            setTimeout(() => {
                window.location.href = link;
            }, 1200); 
        }).catch(err => {
            // Se houver erro ou bloqueio, muda de página direto para não travar
            window.location.href = link;
        });
    }
</script>
</body>
