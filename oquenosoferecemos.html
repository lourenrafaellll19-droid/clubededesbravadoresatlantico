<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O que nós oferecemos - Clube Atlântico</title>
    <link rel="stylesheet" href="oquenosoferecemos.css">
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <main class="page-container">
        
        <header class="header-topo">
            <img src="logo-atlantico.png" alt="Logo Clube Atlântico" class="club-logo">
            <div class="titulo-wrapper">
                <img src="ornamentoamarelo.png" alt="" class="ornamento hide-mobile">
                <h1 class="titulo-gotico">O que oferecemos</h1>
                <img src="ornamentoamarelo.png" alt="" class="ornamento ornamento-dir hide-mobile">
            </div>
        </header>

        <section class="cards-main-container">
            
            <article class="value-card">
                <div class="image-frame">
                    <img src="amizadesverdadeiras.png" alt="Amizades Verdadeiras" class="card-image">
                    <h3 class="card-title">AMIZADES VERDADEIRAS</h3>
                </div>
            </article>

            <article class="value-card">
                <div class="image-frame">
                    <img src="comunhãocomdeus.png" alt="Comunhão com Deus" class="card-image">
                    <h3 class="card-title">COMUNHÃO COM DEUS</h3>
                </div>
            </article>

            <article class="value-card">
                <div class="image-frame">
                    <img src="acampamentos.png" alt="Acampamentos" class="card-image">
                    <h3 class="card-title">ACAMPAMENTOS</h3>
                </div>
            </article>

            <article class="article-card">
                <div class="image-frame">
                    <img src="inclusãosocial.png" alt="Inclusão Social" class="card-image">
                    <h3 class="card-title">INCLUSÃO SOCIAL</h3>
                </div>
            </article>

        </section>

        <footer class="navigation-footer">
            <a href="aventurasnaturais.html" class="btn-pilula" onclick="transicaoComSom(event)">VOLTAR</a>
            <a href="diretoria.html" class="btn-pilula" onclick="transicaoComSom(event)">SEGUINTE</a>
        </footer>

    </main>

    <audio id="somBrilho" preload="auto">
        <source src="somdoclique.mp3" type="audio/mpeg">
    </audio>

    <script>
        function transicaoComSom(event) {
            event.preventDefault(); 
            const link = event.currentTarget.href;
            const som = document.getElementById('somBrilho');
            som.play().then(() => {
                setTimeout(() => {
                    window.location.href = link;
                }, 1000); 
            }).catch(err => {
                window.location.href = link;
            });
        }
    </script>
</body>
</html>
