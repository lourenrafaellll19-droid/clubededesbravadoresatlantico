<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clube de Desbravadores Atlântico</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="home.style.css?v=6">
</head>
<body>

    <video autoplay muted loop playsinline id="bg-video">
        <source src="seu-video.mp4" type="video/mp4">
    </video>

    <main class="container">
        <div class="header-visual">
            <img src="logo-atlantico.png" alt="Logo Atlântico" class="logo-topo">
            <div class="ornamentos-box">
                <h1 class="texto-brilhante">Clube de desbravadores</h1>
                <h2 class="titulo-principal texto-brilhante">Atlântico</h2>
            </div>
        </div>

        <nav class="menu">
            <a href="iniciar.html" class="btn">INICIAR</a>
            <a href="apontamentos.html" class="btn">APONTAMENTOS</a>
            <a href="enviar especialidade.html" class="btn">ENVIAR AS ESPECIALIDADES</a>
        </nav>
    </main>

    <audio id="somBrilho" preload="auto">
        <source src="somdoclique.mp3" type="audio/mpeg">
    </audio>

    <script>
        function transicaoComSom(event) {
            event.preventDefault(); 
            const link = event.currentTarget.href;
            const som = document.getElementById('somBrilho');
            if(som) {
                som.play().then(() => {
                    setTimeout(() => { window.location.href = link; }, 1000);
                }).catch(() => { window.location.href = link; });
            } else {
                window.location.href = link;
            }
        }
    </script>
</body>
</html>
